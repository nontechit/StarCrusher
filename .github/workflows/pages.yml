name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust + WASM target
        run: |
          rustup toolchain install stable --target wasm32-unknown-unknown
          rustup default stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Audit dependencies
        run: |
          cargo install cargo-audit --locked
          cargo audit --ignore RUSTSEC-2025-0035

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Copy static site files
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          cp CNAME dist/CNAME
          cp mq_js_bundle.js dist/mq_js_bundle.js
          cp target/wasm32-unknown-unknown/release/star-crusher.wasm dist/star-crusher.wasm

      - name: Upload Pages artifact
        if: github.repository == 'nontechit/StarCrusher'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Fork build note
        if: github.repository != 'nontechit/StarCrusher'
        run: |
          echo "WASM build and audit passed on fork ${GITHUB_REPOSITORY}."
          echo "GitHub Pages deploy runs only on nontechit/StarCrusher (www.boohw.com)."

  deploy:
    if: github.repository == 'nontechit/StarCrusher'
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
