<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarCrusher - Educational Arcade Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; }
        canvas { image-rendering: pixelated; max-width: 100vw; max-height: 100vh; }
        #loading { position: absolute; color: #fff; font-size: 24px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <div id="loading">Loading StarCrusher...</div>
    <canvas id="game"></canvas>
    <script type="module">
        import init from './star_crusher.js';
        
        async function run() {
            try {
                await init({ module: './star_crusher_bg.wasm' });
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').textContent = 'Error loading game. Check console.';
                console.error(e);
            }
        }
        
        run();
    </script>
</body>
</html>
