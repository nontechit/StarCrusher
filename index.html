<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'">
    <title>StarCrusher</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #070912;
            --panel: rgba(5, 12, 25, 0.94);
            --panel-soft: rgba(8, 18, 35, 0.86);
            --line: rgba(79, 183, 255, 0.72);
            --text: #f4f8ff;
            --muted: #a7d8f4;
            --gold: #ffd166;
            --cyan: #3dd6d0;
            --pink: #ff5c8a;
            --ink: #030712;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: "Courier New", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            overscroll-behavior: none;
            -webkit-text-size-adjust: 100%;
        }

        body {
            overflow-x: hidden;
        }

        #starfield {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            z-index: 0;
            background:
                linear-gradient(rgba(59, 151, 215, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 151, 215, 0.08) 1px, transparent 1px),
                #02050d;
            background-size: 68px 68px;
        }

        .landing {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            min-height: 100dvh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            padding: clamp(14px, 2vw, 24px) clamp(18px, 4vw, 56px) 22px;
        }

        .topbar,
        .footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            color: var(--muted);
            font-size: 0.82rem;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            color: var(--text);
        }

        .brand-mark::before {
            content: "";
            width: 28px;
            height: 18px;
            display: inline-block;
            background:
                linear-gradient(var(--cyan), var(--cyan)) 10px 0 / 8px 4px no-repeat,
                linear-gradient(#e7f7ff, #e7f7ff) 3px 5px / 22px 10px no-repeat,
                linear-gradient(var(--gold), var(--gold)) 10px 15px / 4px 5px no-repeat,
                linear-gradient(var(--gold), var(--gold)) 16px 15px / 4px 5px no-repeat;
        }

        .hero {
            width: min(760px, 100%);
            margin: 0 auto;
            display: grid;
            gap: clamp(16px, 2.8vh, 28px);
            align-content: center;
            padding: clamp(20px, 4vh, 44px) 0 clamp(18px, 3vh, 32px);
        }

        .hero-copy {
            min-width: 0;
            text-align: center;
        }

        .eyebrow {
            margin: 0 0 12px;
            color: var(--cyan);
            font-size: clamp(0.8rem, 1.8vw, 1rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.9rem, 8vw, 5rem);
            line-height: 1;
            letter-spacing: 0;
            text-transform: uppercase;
            white-space: nowrap;
            text-shadow: 0 0 18px rgba(127, 217, 255, 0.22);
        }

        .subtitle {
            max-width: 620px;
            margin: 14px auto 0;
            color: var(--muted);
            font-size: clamp(0.95rem, 1.8vw, 1.08rem);
            line-height: 1.45;
        }

        .actions {
            display: flex;
            align-items: center;
            flex-direction: column;
            gap: 16px;
            margin-top: 26px;
        }

        button {
            border: 3px solid #d99f2f;
            border-radius: 18px;
            min-height: 82px;
            width: min(100%, 680px);
            padding: 0 24px;
            color: #071018;
            background: #ffd66f;
            font: inherit;
            font-size: clamp(1.3rem, 3vw, 1.8rem);
            font-weight: 900;
            cursor: pointer;
            box-shadow: inset 0 -6px 0 rgba(212, 142, 37, 0.24), 0 0 28px rgba(255, 209, 102, 0.18);
        }

        button:hover,
        button:focus-visible {
            transform: translateY(-1px);
            outline: 2px solid rgba(255, 255, 255, 0.72);
            outline-offset: 3px;
        }

        button:disabled {
            cursor: wait;
            filter: saturate(0.65);
            opacity: 0.8;
            transform: none;
        }

        .status {
            min-height: 24px;
            color: var(--muted);
            font-size: 0.92rem;
            font-weight: 650;
        }

        .deck-visual {
            position: relative;
            min-height: clamp(148px, 25vh, 196px);
            border: 3px solid rgba(79, 183, 255, 0.8);
            border-radius: 18px;
            background: rgba(5, 14, 29, 0.92);
            box-shadow: inset 0 0 0 3px rgba(6, 24, 44, 0.76), 0 0 30px rgba(61, 214, 208, 0.1);
            overflow: hidden;
        }

        .deck-visual::before,
        .deck-visual::after {
            content: "";
            position: absolute;
            left: 16%;
            right: 16%;
            height: 4px;
            background: rgba(79, 183, 255, 0.48);
        }

        .deck-visual::before {
            top: 48%;
        }

        .deck-visual::after {
            top: 58%;
        }

        .ship {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 170px;
            height: 70px;
            transform: translate(-50%, -50%);
            background:
                linear-gradient(var(--cyan), var(--cyan)) 70px 8px / 38px 12px no-repeat,
                linear-gradient(#e7f7ff, #e7f7ff) 44px 26px / 82px 30px no-repeat,
                linear-gradient(#e7f7ff, #e7f7ff) 72px 0 / 42px 28px no-repeat,
                linear-gradient(var(--gold), var(--gold)) 72px 56px / 12px 20px no-repeat,
                linear-gradient(var(--gold), var(--gold)) 94px 56px / 12px 20px no-repeat,
                linear-gradient(var(--cyan), var(--cyan)) 18px 34px / 26px 20px no-repeat,
                linear-gradient(var(--cyan), var(--cyan)) 126px 34px / 26px 20px no-repeat;
        }

        .crew {
            position: absolute;
            bottom: 12px;
            width: 44px;
            height: 70px;
            background:
                linear-gradient(var(--cyan), var(--cyan)) 12px 10px / 20px 10px no-repeat,
                linear-gradient(#e7f7ff, #e7f7ff) 8px 0 / 28px 24px no-repeat,
                linear-gradient(#e7f7ff, #e7f7ff) 0 26px / 44px 34px no-repeat,
                linear-gradient(#e7f7ff, #e7f7ff) 8px 60px / 10px 22px no-repeat,
                linear-gradient(#e7f7ff, #e7f7ff) 26px 60px / 10px 22px no-repeat;
        }

        .crew.left {
            left: 28%;
        }

        .crew.right {
            right: 28%;
        }

        .crew.right {
            background:
                linear-gradient(var(--pink), var(--pink)) 12px 10px / 20px 10px no-repeat,
                linear-gradient(#e7f7ff, #e7f7ff) 8px 0 / 28px 24px no-repeat,
                linear-gradient(#e7f7ff, #e7f7ff) 0 26px / 44px 34px no-repeat,
                linear-gradient(#e7f7ff, #e7f7ff) 8px 60px / 10px 22px no-repeat,
                linear-gradient(#e7f7ff, #e7f7ff) 26px 60px / 10px 22px no-repeat;
        }

        .planet {
            position: absolute;
            top: 50%;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            transform: translateY(-50%);
            background: #e7f7ff;
        }

        .planet.left {
            left: 8%;
        }

        .planet.right {
            right: 8%;
            background: var(--pink);
        }

        .game-shell {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 3;
            background: #000;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .game-shell.active {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-bottom: max(14px, env(safe-area-inset-bottom));
        }

        .site-exit {
            position: relative;
            z-index: 4;
            align-self: center;
            flex-shrink: 0;
            margin: 0 auto;
            display: none;
            align-items: center;
            min-height: 44px;
            padding: 0 20px;
            font-size: 1rem;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 8px;
            color: #f8fbff;
            background: rgba(7, 12, 22, 0.82);
            box-shadow: 0 10px 34px rgba(0, 0, 0, 0.32);
            backdrop-filter: blur(12px);
            cursor: pointer;
        }

        @media (min-width: 701px) {
            .game-shell.active .site-exit.visible {
                position: relative;
                top: auto;
                bottom: auto;
                left: auto;
                transform: none;
                align-self: center;
                flex-shrink: 0;
                margin: 10px auto max(18px, env(safe-area-inset-bottom));
            }
        }

        .site-exit.visible {
            display: inline-flex;
        }

        .site-exit:hover,
        .site-exit:focus-visible {
            background: rgba(23, 33, 52, 0.92);
        }

        .game-overlay {
            position: fixed;
            z-index: 5;
            display: none;
            pointer-events: none;
        }

        .game-overlay.visible {
            display: block;
        }

        .overlay-stage {
            position: relative;
            width: 720px;
            height: 1280px;
            transform-origin: top left;
            transform: scale(var(--game-scale, 1));
            pointer-events: none;
        }

        .overlay-button {
            position: absolute;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .game-overlay .overlay-home {
            left: 24px;
            top: 24px;
            width: 126px;
            min-height: 58px;
            height: 58px;
            border-radius: 16px;
            font-size: 18px;
        }

        .game-overlay .overlay-action,
        .game-overlay .overlay-menu,
        .game-overlay .overlay-spelling {
            left: 24px;
            width: 672px;
            min-height: 132px;
            height: 132px;
            font-size: 40px;
        }

        .game-overlay .overlay-action {
            top: 1120px;
        }

        .game-overlay .overlay-action.slot-definition-action {
            top: 936px;
        }

        .game-overlay .overlay-menu.slot-menu-0 {
            top: 640px;
        }

        .game-overlay .overlay-menu.slot-menu-1 {
            top: 796px;
        }

        .game-overlay .overlay-menu.slot-menu-2 {
            top: 952px;
        }

        .game-overlay .overlay-spelling.slot-spelling-play {
            top: 864px;
        }

        .game-overlay .overlay-spelling.slot-spelling-night {
            top: 1024px;
        }

        /* Gate-question keypad: 3×4 grid matching the canvas keypad at (248,676) */
        .game-overlay .overlay-keypad {
            width: 68px;
            min-height: 68px;
            height: 68px;
            border-radius: 12px;
            font-size: 18px;
            padding: 0;
        }

        .game-overlay .overlay-keypad.slot-keypad-0  { left: 248px; top: 676px; }
        .game-overlay .overlay-keypad.slot-keypad-1  { left: 326px; top: 676px; }
        .game-overlay .overlay-keypad.slot-keypad-2  { left: 404px; top: 676px; }
        .game-overlay .overlay-keypad.slot-keypad-3  { left: 248px; top: 754px; }
        .game-overlay .overlay-keypad.slot-keypad-4  { left: 326px; top: 754px; }
        .game-overlay .overlay-keypad.slot-keypad-5  { left: 404px; top: 754px; }
        .game-overlay .overlay-keypad.slot-keypad-6  { left: 248px; top: 832px; }
        .game-overlay .overlay-keypad.slot-keypad-7  { left: 326px; top: 832px; }
        .game-overlay .overlay-keypad.slot-keypad-8  { left: 404px; top: 832px; }
        .game-overlay .overlay-keypad.slot-keypad-9  { left: 248px; top: 910px; }
        .game-overlay .overlay-keypad.slot-keypad-10 { left: 326px; top: 910px; }
        .game-overlay .overlay-keypad.slot-keypad-11 { left: 404px; top: 910px; }

        @media (max-width: 700px) {
            .game-shell.active {
                display: block;
                width: 100%;
                height: 100%;
                height: 100dvh;
                height: 100svh;
                gap: 0;
                padding-bottom: 0;
            }

            .game-shell.active #glcanvas {
                position: fixed;
                flex: none;
            }
        }

        #glcanvas {
            display: block;
            margin: 0;
            padding: 0;
            border: 0;
            image-rendering: auto;
            background: #000;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-shell.active #glcanvas {
            flex: 1 1 auto;
            width: 100%;
            min-height: 0;
        }

        @media (min-width: 701px) {
            .game-shell.active #glcanvas {
                height: auto;
                max-height: 100dvh;
            }
        }

        @media (max-width: 1080px) {
            .hero {
                align-content: start;
                gap: 22px;
                padding-top: clamp(26px, 5vh, 46px);
            }

            .hero-copy {
                max-width: none;
            }

            h1 {
                font-size: clamp(3rem, 10vw, 5.2rem);
            }
        }

        @media (max-width: 820px) {
            .landing {
                min-height: 100svh;
                padding: 18px clamp(16px, 5vw, 28px) 20px;
            }

            .topbar,
            .footer {
                align-items: flex-start;
                flex-direction: column;
                gap: 8px;
            }

            .hero {
                gap: 20px;
                padding: 18px 0 24px;
            }

            h1 {
                font-size: clamp(2.45rem, 11vw, 4.2rem);
                line-height: 1;
            }

            .eyebrow {
                margin-bottom: 14px;
                font-size: 0.76rem;
            }

            .subtitle {
                margin-top: 12px;
                font-size: 0.95rem;
                line-height: 1.48;
            }

            .actions {
                margin-top: 20px;
            }

            button:not(.site-exit) {
                width: 100%;
            }

            .status {
                min-height: 0;
            }
        }

        @media (max-width: 430px) {
            .brand-mark::before {
                width: 22px;
                height: 22px;
            }

            .topbar {
                font-size: 0.86rem;
            }

            .hero {
                padding-top: 22px;
            }

            h1 {
                font-size: clamp(2rem, 10vw, 2.7rem);
            }

            .deck-visual {
                min-height: 148px;
            }

            .ship {
                transform: translate(-50%, -50%) scale(0.72);
            }

            .crew {
                transform: scale(0.72);
                transform-origin: bottom center;
            }

            .planet {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>
<body>
    <canvas id="starfield" aria-hidden="true"></canvas>

    <main class="landing" id="landing">
        <header class="topbar">
            <div class="brand-mark">Star Crusher</div>
        </header>

        <section class="hero" aria-labelledby="title">
            <div class="deck-visual" aria-hidden="true">
                <span class="planet left"></span>
                <span class="ship"></span>
                <span class="crew left"></span>
                <span class="crew right"></span>
                <span class="planet right"></span>
            </div>

            <div class="hero-copy">
                <p class="eyebrow">Star Crusher Arcade Learning Missions</p>
                <h1 id="title">Star Crusher</h1>
                <p class="subtitle">Choose a mission path, then jump into quick math and reading arcade runs.</p>
                <div class="actions">
                    <button id="launch" type="button">Launch Game</button>
                    <button id="select-mission" type="button">Select Mission</button>
                    <span class="status" id="status" role="status" aria-live="polite">Ready when you are.</span>
                </div>
            </div>
        </section>

    </main>

    <section class="game-shell" id="game-shell" aria-label="StarCrusher game">
        <canvas id="glcanvas" tabindex="1"></canvas>
        <div class="game-overlay" id="game-overlay" aria-hidden="false">
            <div class="overlay-stage" id="game-overlay-stage"></div>
        </div>
        <button class="site-exit" id="site-exit" type="button" aria-label="Back to Home">Back to Home</button>
    </section>

    <script>
        const stars = document.getElementById('starfield');
        const ctx = stars.getContext('2d');
        const launch = document.getElementById('launch');
        const selectMission = document.getElementById('select-mission');
        const status = document.getElementById('status');
        const landing = document.getElementById('landing');
        const shell = document.getElementById('game-shell');
        const siteExit = document.getElementById('site-exit');
        const glcanvas = document.getElementById('glcanvas');
        const gameOverlay = document.getElementById('game-overlay');
        const gameOverlayStage = document.getElementById('game-overlay-stage');
        const particles = [];
        let loaderStarted = false;
        let gameInputState = 'site';
        let latestOverlayJson = '';
        let renderedOverlayJson = '';

        function activeVirtualScreen() {
            return isMobileShell() ? { w: 720, h: 1280 } : { w: 1280, h: 720 };
        }

        const mobileShellQuery = window.matchMedia('(max-width: 700px)');

        function isMobileShell() {
            return mobileShellQuery.matches;
        }

        function syncGameCanvasSize() {
            if (!shell.classList.contains('active')) {
                return;
            }

            const virtualScreen = activeVirtualScreen();

            if (isMobileShell()) {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.visualViewport?.height ?? window.innerHeight;
                const scale = Math.min(
                    viewportWidth / virtualScreen.w,
                    viewportHeight / virtualScreen.h
                );
                const canvasWidth = Math.round(virtualScreen.w * scale);
                const canvasHeight = Math.round(virtualScreen.h * scale);
                const offsetX = Math.round((viewportWidth - canvasWidth) / 2);
                const offsetY = Math.round((viewportHeight - canvasHeight) / 2);

                glcanvas.style.position = 'fixed';
                glcanvas.style.left = `${offsetX}px`;
                glcanvas.style.top = `${offsetY}px`;
                glcanvas.style.right = 'auto';
                glcanvas.style.bottom = 'auto';
                glcanvas.style.width = `${canvasWidth}px`;
                glcanvas.style.height = `${canvasHeight}px`;
                gameOverlay.style.left = `${offsetX}px`;
                gameOverlay.style.top = `${offsetY}px`;
                gameOverlay.style.width = `${canvasWidth}px`;
                gameOverlay.style.height = `${canvasHeight}px`;
                gameOverlayStage.style.width = `${virtualScreen.w}px`;
                gameOverlayStage.style.height = `${virtualScreen.h}px`;
                gameOverlayStage.style.setProperty('--game-scale', String(scale));
            } else {
                glcanvas.style.position = '';
                glcanvas.style.left = '';
                glcanvas.style.top = '';
                glcanvas.style.right = '';
                glcanvas.style.bottom = '';
                glcanvas.style.width = '';
                glcanvas.style.height = '';
                gameOverlay.style.left = '';
                gameOverlay.style.top = '';
                gameOverlay.style.width = '';
                gameOverlay.style.height = '';
                gameOverlayStage.style.width = `${virtualScreen.w}px`;
                gameOverlayStage.style.height = `${virtualScreen.h}px`;
                gameOverlayStage.style.setProperty('--game-scale', '1');
            }

            syncMobileSiteExitChrome();
            if (latestOverlayJson) {
                renderGameOverlay(latestOverlayJson, { force: true });
            }
            window.dispatchEvent(new Event('resize'));
        }

        function syncSiteExitLabel() {
            siteExit.textContent = 'Back to Home';
            siteExit.setAttribute('aria-label', 'Back to Home');
        }

        function syncMobileSiteExitChrome() {
            if (shell.classList.contains('active') && isMobileShell()) {
                siteExit.classList.remove('mobile-chrome');
                siteExit.style.display = 'none';
                syncSiteExitLabel();
                return;
            }

            siteExit.style.display = '';
            siteExit.classList.remove('mobile-chrome');
            siteExit.style.left = '';
            siteExit.style.top = '';
            siteExit.style.width = '';
            siteExit.style.height = '';
            siteExit.style.fontSize = '';
            siteExit.style.borderRadius = '';
            syncSiteExitLabel();
        }

        // Precise mobile controls are real HTML buttons layered above the
        // canvas. Gesture-heavy gameplay still falls through to Macroquad.

        function resizeStars() {
            const scale = Math.min(window.devicePixelRatio || 1, 2);
            stars.width = Math.floor(window.innerWidth * scale);
            stars.height = Math.floor(window.innerHeight * scale);
            ctx.setTransform(scale, 0, 0, scale, 0, 0);
            if (particles.length === 0) {
                for (let i = 0; i < 150; i += 1) {
                    particles.push({
                        x: Math.random() * window.innerWidth,
                        y: Math.random() * window.innerHeight,
                        r: Math.random() * 1.8 + 0.4,
                        v: Math.random() * 0.42 + 0.08,
                        a: Math.random() * 0.55 + 0.25
                    });
                }
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            for (const star of particles) {
                star.y += star.v;
                if (star.y > window.innerHeight + 8) {
                    star.y = -8;
                    star.x = Math.random() * window.innerWidth;
                }
                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 255, 255, ${star.a})`;
                ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(drawStars);
        }

        function sendGameKey(key, code) {
            const keyCodeMap = {
                Enter: 13,
                Escape: 27,
                Backspace: 8
            };
            const keyCode = keyCodeMap[key] || (key.length === 1 ? key.toUpperCase().charCodeAt(0) : 0);
            const eventInit = {
                key,
                code,
                keyCode,
                which: keyCode,
                bubbles: true,
                cancelable: true
            };
            const targets = [glcanvas, document, window];

            for (const target of targets) {
                target.dispatchEvent(new KeyboardEvent('keydown', eventInit));
            }
            for (const target of targets) {
                target.dispatchEvent(new KeyboardEvent('keyup', eventInit));
            }
        }

        function sendLetter(letter) {
            // Digit keys use 'Digit5' code; letter keys use 'KeyR' code.
            // into_sapp_keycode in the WASM bundle only maps 'Digit0'..'Digit9'
            // for the number row — 'Key0'..'Key9' have no entry and return
            // undefined, so key_down would receive 0 (unknown key).
            const code = (letter >= '0' && letter <= '9')
                ? `Digit${letter}`
                : `Key${letter.toUpperCase()}`;
            sendGameKey(letter.toLowerCase(), code);
        }

        function sendEnter() {
            sendGameKey('Enter', 'Enter');
        }

        function sendEscape() {
            sendGameKey('Escape', 'Escape');
        }

        function sendBackspace() {
            sendGameKey('Backspace', 'Backspace');
        }

        function runOverlayAction(action) {
            glcanvas.focus();
            if (action === 'enter') {
                sendEnter();
            } else if (action === 'escape') {
                sendEscape();
            } else if (action === 'backspace') {
                sendBackspace();
            } else if (action.startsWith('key:') && action.length > 4) {
                sendLetter(action.slice(4, 5));
            }
        }

        function overlayButtonClass(slot) {
            if (slot === 'action') return 'overlay-action';
            if (slot === 'definition-action') return 'overlay-action slot-definition-action';
            if (slot && slot.startsWith('menu-')) return `overlay-menu slot-${slot}`;
            if (slot && slot.startsWith('spelling-')) return `overlay-spelling slot-${slot}`;
            if (slot && slot.startsWith('keypad-')) return `overlay-keypad slot-${slot}`;
            return 'overlay-action';
        }

        function renderGameOverlay(jsonString, options = {}) {
            const nextOverlayJson = jsonString || '';
            latestOverlayJson = nextOverlayJson;

            if (!options.force && nextOverlayJson === renderedOverlayJson) {
                return;
            }

            renderedOverlayJson = nextOverlayJson;

            if (!nextOverlayJson || !shell.classList.contains('active') || !isMobileShell()) {
                gameOverlay.classList.remove('visible');
                gameOverlayStage.replaceChildren();
                return;
            }

            let overlay;
            try {
                overlay = JSON.parse(nextOverlayJson);
            } catch (error) {
                console.warn('StarCrusher overlay JSON parse failed', error);
                gameOverlay.classList.remove('visible');
                gameOverlayStage.replaceChildren();
                return;
            }

            gameOverlayStage.replaceChildren();

            const controls = [];
            if (overlay.home) {
                controls.push({ ...overlay.home, slot: 'home' });
            }
            for (const button of overlay.buttons || []) {
                controls.push(button);
            }

            for (const control of controls) {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = control.slot === 'home'
                    ? 'overlay-button overlay-home'
                    : `overlay-button ${overlayButtonClass(control.slot)}`;
                button.textContent = control.label;
                button.addEventListener('click', (event) => {
                    event.preventDefault();
                    runOverlayAction(control.action);
                });
                gameOverlayStage.appendChild(button);
            }

            gameOverlay.classList.toggle('visible', controls.length > 0);
        }

        const BOOHW_STARCRUSHER_EVENT_VERSION = 1;

        /**
         * Shell handoff entry point. Parses the serialized PlatformEventPayload JSON
         * from wasm and forwards it to the platform-hosted parent (no fetch here).
         */
        function boohwStarCrusherForwardEvent(jsonString) {
            let payload;
            try {
                payload = JSON.parse(jsonString);
            } catch (error) {
                console.error('StarCrusher event JSON parse failed', error);
                return;
            }

            const message = {
                type: 'boohw.starcrusher.event',
                version: BOOHW_STARCRUSHER_EVENT_VERSION,
                payload
            };

            if (window.parent && window.parent !== window) {
                window.parent.postMessage(message, window.location.origin);
                return;
            }

            console.debug('StarCrusher event (no parent shell):', message);
            window.dispatchEvent(new CustomEvent('boohw:starcrusher:event', { detail: message }));
        }

        function registerStarCrusherPlatformBridge() {
            if (typeof miniquad_add_plugin !== 'function') {
                return;
            }

            miniquad_add_plugin({
                name: 'boohw_starcrusher',
                version: 1,
                register_plugin(importObject) {
                    importObject.env.boohw_starcrusher_emit_event = function (ptr, len) {
                        boohwStarCrusherForwardEvent(UTF8ToString(ptr, len));
                    };
                    // Shell hints the desired starting mode so WASM can skip the
                    // (now redundant) in-canvas main title page. 0 = title,
                    // 1 = adventure intro, 2 = mission select.
                    importObject.env.boohw_starcrusher_initial_mode = function () {
                        const hash = (window.location.hash || '').toLowerCase().replace('#', '');
                        if (hash === 'adventure') return 1;
                        if (hash === 'mission') return 2;
                        return 0;
                    };
                    // Lets WASM hand control back to the HTML landing on exit.
                    importObject.env.boohw_starcrusher_return_to_landing = function () {
                        window.location.href = window.location.origin + window.location.pathname;
                    };
                    importObject.env.boohw_starcrusher_set_overlay = function (ptr, len) {
                        renderGameOverlay(UTF8ToString(ptr, len));
                    };

                    // Star Academy progress persistence.
                    // save: Rust passes a JSON string; we write it to localStorage.
                    importObject.env.boohw_starcrusher_save_progress = function (ptr, len) {
                        try {
                            localStorage.setItem('star-academy-progress', UTF8ToString(ptr, len));
                        } catch (e) {
                            console.warn('StarAcademy: save_progress failed', e);
                        }
                    };
                    // load: Rust passes a writable buffer; we copy the stored JSON
                    // into WASM memory and return the byte count written (0 = none).
                    importObject.env.boohw_starcrusher_load_progress = function (ptr, max_len) {
                        try {
                            const data = localStorage.getItem('star-academy-progress');
                            if (!data) return 0;
                            const bytes = new TextEncoder().encode(data);
                            const len = Math.min(bytes.length, max_len);
                            new Uint8Array(wasm_memory.buffer, ptr, len).set(bytes.subarray(0, len));
                            return len;
                        } catch (e) {
                            console.warn('StarAcademy: load_progress failed', e);
                            return 0;
                        }
                    };
                }
            });
        }

        window.boohwStarCrusherForwardEvent = boohwStarCrusherForwardEvent;

        function bridgeCanvasTap(_clientX, _clientY, _fromTouch = false) {
            if (!shell.classList.contains('active')) {
                return false;
            }
            glcanvas.focus();
            // HTML buttons sit above the canvas; gameplay gestures still reach WASM.
            return false;
        }

        function launchGame(game) {
            if (loaderStarted) {
                return;
            }

            loaderStarted = true;
            gameInputState = 'title-main';
            launch.disabled = true;
            selectMission.disabled = true;
            status.textContent = 'Preparing launch...';
            landing.style.display = 'none';
            shell.classList.add('active');
            syncSiteExitLabel();
            siteExit.classList.add('visible');
            document.body.style.overflow = 'hidden';
            document.documentElement.style.overflow = 'hidden';
            syncGameCanvasSize();
            glcanvas.focus();

            const script = document.createElement('script');
            script.src = 'mq_js_bundle.js';
            script.async = true;
            script.onload = () => {
                try {
                    if (typeof window.load !== 'function') {
                        throw new Error('Macroquad loader did not initialize.');
                    }
                    registerStarCrusherPlatformBridge();
                    window.load('star-crusher.wasm?v=1.6.6-' + Date.now());
                    syncGameCanvasSize();
                    requestAnimationFrame(syncGameCanvasSize);
                    setTimeout(syncGameCanvasSize, 100);
                    setTimeout(syncGameCanvasSize, 500);
                    setTimeout(syncGameCanvasSize, 1500);
                    // Mini-game shortcuts that target specific games (m/p/r)
                    // still ride a synthesised key — they go through the
                    // mini-games sub-screen. The main "Launch Game" and
                    // "Select Mission" paths set window.location.hash earlier
                    // and the WASM reads it via boohw_starcrusher_initial_mode
                    // to skip the canvas title page entirely.
                    const keyMap = { mathinv: 'm', mathpong: 'p', readsnake: 'r' };
                    const key = keyMap[game];
                    if (key) {
                        setTimeout(() => {
                            sendLetter(key);
                            gameInputState = 'game';
                        }, 2000);
                    } else {
                        gameInputState = 'game';
                    }
                } catch (error) {
                    showLaunchError(error);
                }
            };
            script.onerror = () => showLaunchError(new Error('Could not download the Macroquad loader.'));
            document.body.appendChild(script);
        }

        function showLaunchError(error) {
            console.error(error);
            shell.classList.remove('active');
            siteExit.classList.remove('visible');
            landing.style.display = '';
            document.documentElement.style.overflow = '';
            document.body.style.overflow = '';
            launch.disabled = false;
            selectMission.disabled = false;
            loaderStarted = false;
            gameInputState = 'site';
            status.textContent = 'Launch failed. Please refresh and try again.';
        }

        window.addEventListener('resize', () => {
            resizeStars();
            syncGameCanvasSize();
        });
        window.visualViewport?.addEventListener('resize', syncGameCanvasSize);
        mobileShellQuery.addEventListener('change', syncGameCanvasSize);
        window.addEventListener('touchmove', (event) => {
            if (shell.classList.contains('active')) {
                event.preventDefault();
            }
        }, { passive: false });
        glcanvas.addEventListener('touchstart', (event) => {
            if (!shell.classList.contains('active')) {
                return;
            }

            const touch = event.changedTouches[0];
            if (touch && bridgeCanvasTap(touch.clientX, touch.clientY, true)) {
                event.preventDefault();
            }
        }, { passive: false });
        glcanvas.addEventListener('click', (event) => {
            bridgeCanvasTap(event.clientX, event.clientY);
        });
        launch.addEventListener('click', () => {
            // Hint the WASM to boot straight into the adventure intro,
            // skipping the in-canvas main title page (which is now identical
            // to this HTML landing).
            history.replaceState(null, '', '#adventure');
            launchGame('adventure');
        });
        selectMission.addEventListener('click', () => {
            // Hint the WASM to boot straight into the mini-games sub-screen.
            history.replaceState(null, '', '#mission');
            launchGame('mission');
        });
        siteExit.addEventListener('click', () => {
            window.location.href = `${window.location.origin}${window.location.pathname}`;
        });
        resizeStars();
        drawStars();
    </script>
</body>
</html>
